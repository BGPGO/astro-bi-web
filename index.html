<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Astro Distribuidora · BI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <!-- React PRODUCTION (minificado, ~10x mais rapido que development build) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>

  <script>
    // Le filtro persistido ANTES do data.js, pq data.js usa window.BIT_FILTER pra montar BIT inicial.
    try { window.BIT_FILTER = localStorage.getItem('bi.statusFilter') || 'realizado'; }
    catch (e) { window.BIT_FILTER = 'realizado'; }
    // URL da API de geracao on-demand de relatorio IA. Usado pelo PageRelatorio
    // como fallback quando o report-{year}-{month}.json estatico nao existe.
    window.BI_REPORT_API = "https://<api-url-do-bi-config-via-coolify>";
  </script>
  <!-- Astro: dados pre-calculados pelos scripts/build_*_data.py -->
  <script src="astro-data.js"></script>
  <script src="giro-data.js"></script>
  <script src="frete-data.js"></script>
  <script src="pedmin-data.js"></script>
  <script src="recompra-data.js"></script>
  <script src="campanhas-data.js"></script>
  <script src="agressividade-data.js"></script>
  <script src="abc-data.js"></script>
  <!-- data.js + data-extras.js do template (fin40/Omie/etc) — opcionais, BIT vazio se nao gerados -->
  <script>window.BIT = window.BIT || {}; window.BIT_META = window.BIT_META || { empresa: { nome_fantasia: 'Astro Distribuidora', cidade: 'Brasil · BGP GO' } }; window.BIT.fmt = window.BIT.fmt || ((v) => (v||0).toLocaleString('pt-BR', {style:'currency',currency:'BRL'})); window.BIT.fmtK = window.BIT.fmtK || ((v) => { const a=Math.abs(v||0); if(a>=1e6) return 'R$ '+(a/1e6).toFixed(1)+'M'; if(a>=1e3) return 'R$ '+(a/1e3).toFixed(0)+'k'; return 'R$ '+a.toFixed(0); });</script>
  <!-- JSX pre-compilado pelo build-jsx.cjs -->
  <script src="app.bundle.js"></script>
</body>
</html>
